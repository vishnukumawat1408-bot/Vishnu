<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Details Table</title>

<style>
    body{
        background:#f4f6f9;
        font-family: Arial, sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
    }

    .table-container{
        width:90%;
        max-width:900px;
        background:white;
        border-radius:18px;
        overflow:hidden;
        box-shadow:0 8px 25px rgba(0,0,0,0.15);
    }

    table{
        width:100%;
        border-collapse:collapse;
    }

    td{
        padding:22px;
        font-size:24px;
        border-bottom:1px solid #d9d9d9;
    }

    .label{
        width:35%;
        background:#032b63;
        color:white;
        font-weight:bold;
    }

    .value{
        background:white;
        color:#032b63;
        font-weight:600;
    }

    tr:last-child td{
        border-bottom:none;
    }
</style>
</head>

<body>

<div class="table-container">
    <table>

        <tr>
            <td class="label">Name</td>
            <td class="value">Ms. PALAK RATHORE</td>
        </tr>

        <tr>
            <td class="label">Father's Name</td>
            <td class="value">Mr. SURESH RATHORE</td>
        </tr>

        <tr>
            <td class="label">Course</td>
            <td class="value">B.A. PART-3</td>
        </tr>

        <tr>
            <td class="label">Enrollment Number</td>
            <td class="value">105001 / 23</td>
        </tr>

        <tr>
            <td class="label">Scholar Number</td>
            <td class="value">20231102</td>
        </tr>

        <tr>
            <td class="label">Roll No</td>
            <td class="value">196225</td>
        </tr>

        <tr>
            <td class="label">Internship Institute</td>
            <td class="value">
                MAHATMA GANDHI GOVERNMENT SCHOOL SAWARDA
            </td>
        </tr>

        <tr>
            <td class="label">Learnings</td>
            <td class="value">
                Basic Teaching Skills and Office Work
            </td>
        </tr>

    </table>
</div>

</body>
</html>
